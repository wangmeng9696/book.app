name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet 0.19.0
        run: pip install flet==0.19.0

      - name: Force Gradle 8.5 (fix Java 17 compatibility)
        run: |
          # 找到临时项目中的 gradle-wrapper.properties 并强制修改为 8.5
          find . -name "gradle-wrapper.properties" -exec sed -i 's/gradle-7.5-bin.zip/gradle-8.5-bin.zip/g' {} \;

      - name: Build APK
        run: flet build apk --module-name app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/release/app-release.apk
