name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'   # 稳定版本，与 Flet 0.19.0 兼容
          channel: 'stable'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet 0.19.0
        run: pip install flet==0.19.0

      - name: Build APK
        run: flet build apk --module-name app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/release/app-release.apk
        with:
          name: app-release
          path: build/apk/release/app-release.apk
